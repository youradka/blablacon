<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signupstyle_sk.css') }}">
</head>
<body>
 {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="popup {{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
<script>
setTimeout(() => {
    const popup = document.querySelector('.popup');
    if (popup) popup.style.display = 'none';
}, 3000);
</script>
<div class="signup-container">
    <h2>Vytvoriť účet</h2>

    <a href="{{ url_for('forum_sk') }}" class="back-button">← Naspäť</a>

    <!-- action neskôr nastavíš na Python endpoint -->
    <form method="POST" action="/add_user">

        <label for="username">Používateľské meno</label>
        <input type="text" id="username" name="username" required minlength="3">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Heslo</label>
        <input type="password" id="password" name="password" required minlength="6">

        <label for="password_confirm">Potvrdiť heslo</label>
        <input type="password" id="password_confirm" name="password_confirm" required minlength="6">

        <label for="kodik">Pristupovy kod</label>
        <input type="text" id="kodik" name="kodik" required length="6">

        <button type="submit">Zaregistrovať sa</button>
    </form>

    <p class="login-link">
        Už máš účet? <a href="{{ url_for('login_sk') }}">Prihlás sa</a>
    </p>
</div>
</body>
</html>
